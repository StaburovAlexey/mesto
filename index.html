<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./pages/index.css">
  <title>Место</title>
</head>

<body class="page">
  <header class="header">
    <img src="./images/logo.svg" alt="логотип Место Россия" class="header__logo">
  </header>
  <main>
    <section class="profile">
      <div class="profile__info">
        <img src="./images/custo.jpg" alt="жак-ив кусто" class="profile__avatar">
        <div class="profile-info">
          <h1 class="profile-info__name">Жак - Ив Кусто</h1>
          <button class="profile-info__edit-button" type="button" name="edit-button" aria-label="Редактировать профиль"></button>
          <p class="profile-info__about-me">Исследователь океана</p>
        </div>
      </div>
      <button class="profile__add-button" type="button" name="add-button" aria-label="Добавить фото"></button>
    </section>
    <section class="foto">
      <ul class="foto__list">
        <li class="element">
          <img src="./images/alec-wilson-kieWImLnBUo-unsplash.jpg" alt="Каньон" class="element__img">
          <div class="element__description">
            <h2 class="element__name">Каньон</h2>
            <button class="element__button-like" aria-label="Лайк" type="button"></button>
          </div>
        </li>
        <li class="element">
          <img src="./images/christian-keybets-bSBWXvMfEPw-unsplash.jpg" alt="Темный лес" class="element__img">
          <div class="element__description">
            <h2 class="element__name">Темный лес</h2>
            <button class="element__button-like" aria-label="Лайк" type="button"></button>
          </div>
        </li>
        <li class="element">
          <img src="./images/gabor-kozmon-a2zK5tC3u1c-unsplash.jpg" alt="Туманные горы" class="element__img">
          <div class="element__description">
            <h2 class="element__name">Туманные горы</h2>
            <button class="element__button-like" aria-label="Лайк" type="button"></button>
          </div>
        </li>
        <li class="element">
          <img src="./images/marek-piwnicki-G-Al9hczvzI-unsplash.jpg" alt="Солнечные горы" class="element__img">
          <div class="element__description">
            <h2 class="element__name">Солнечные горы</h2>
            <button class="element__button-like" aria-label="Лайк" type="button"></button>
          </div>
        </li>
        <li class="element">
          <img src="./images/rohan-gupta-Dq_XiJm203A-unsplash.jpg" alt="закат" class="element__img">
          <div class="element__description">
            <h2 class="element__name">Закат</h2>
            <button class="element__button-like" aria-label="Лайк" type="button"></button>
          </div>
        </li>
        <li class="element">
          <img src="./images/sean-d-TKn8uxc20vQ-unsplash.jpg" alt="Хвойный лес" class="element__img">
          <div class="element__description">
            <h2 class="element__name">Хвойный лес</h2>
            <button class="element__button-like" aria-label="Лайк" type="button"></button>
          </div>
        </li>
      </ul>
    </section>
  </main>
  <footer class="footer">
    <p class="footer__copyright">&copy; 2023 Mesto Russia</p>
  </footer>
  <div class="popup">
    <article class="popup__container">
      <button class="popup__button-close" aria-label="закрыть форму" name="button"></button>
      <h2 class="popup__title">Редактировать профиль</h2>
      <form action="" name="edit-profile" class="form-edit-profile">
        <input type="text" class="popup__input" name="name" id="input-name" value="Жак - Ив Кусто">
        <input type="text" class="popup__input" name="about-me" id="input-aboutme" value="Исследователь океана">
        <button type="submit" class="popup__submit" aria-label="сохранить" name="submit">Сохранить</button>
      </form>
    </article>
  </div>
  <script src="./scripts/index.js"></script>
</body>

</html>
